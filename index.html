<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AKHLAQVERSE — Platform Akhlak Digital</title>

  <!-- React 18 + Babel Standalone via unpkg (reliable for GitHub Pages) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f0f0f;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: auto;
    }

    #root {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 0;
    }

    /* ═══════════════════════════════════════
        FIXED PHONE SHELL — 402 × 874 px
     ═══════════════════════════════════════ */
    #phone-shell {
      width:  402px;
      height: 874px;
      min-width:  402px;
      min-height: 874px;
      max-width:  402px;
      max-height: 874px;

      background: #fff;
      border-radius: 52px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;
      display: flex;
      flex-direction: column;

      box-shadow:
        0 0 0 2px  #555,
        0 0 0 11px #1a1a1a,
        0 0 0 13px #3a3a3a,
        0 40px 100px rgba(0,0,0,.85),
        0  0   80px rgba(99,102,241,.15);
    }

    #phone-shell::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 9999;
      pointer-events: none;
    }

    #phone-shell::after {
      content: '';
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 5px;
      background: rgba(0,0,0,.35);
      border-radius: 3px;
      z-index: 9999;
      pointer-events: none;
    }

    #app-inner {
      width:  100%;
      height: 100%;
      overflow: hidden;
      padding-top:    42px;  
      padding-bottom: 22px;  
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    #react-root {
      flex: 1;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .desktop-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #1a237e44 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 70%, #4a148c33 0%, transparent 60%),
                  linear-gradient(135deg, #0a0a0a 0%, #111827 100%);
      z-index: -1;
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      pointer-events: none;
      z-index: -1;
    }
    .orb-1 { width:400px;height:400px;background:#1cb0f6;top:-100px;left:-100px; }
    .orb-2 { width:350px;height:350px;background:#58cc02;bottom:-80px;right:-80px; }
    .orb-3 { width:250px;height:250px;background:#ce82ff;top:40%;right:5%; }

    .phone-label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.25);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Nunito', sans-serif;
      white-space: nowrap;
      z-index: 1;
    }

    /* ── Segmented Control / Capsule Buttons Styles ── */
    .role-capsule-container {
      display: flex;
      background: #eee;
      padding: 4px;
      border-radius: 30px;
      position: relative;
      margin: 15px 0;
    }
    .role-capsule-bg {
      position: absolute;
      top: 4px; bottom: 4px;
      border-radius: 26px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .role-btn-item {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      z-index: 2;
      border-radius: 26px;
      transition: color 0.3s;
    }

    /* ── Welcome Screen Styles ── */
    .welcome-screen-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 24px;
      color: #fff;
      text-align: center;
      background: linear-gradient(160deg, #091e09, #0d350d, #144d14);
    }
    .welcome-logo {
      font-size: 72px;
      margin-bottom: 10px;
      animation: floatUp 2.5s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(88, 204, 2, 0.6));
    }
    .welcome-title {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 3px;
      margin-bottom: 8px;
      background: linear-gradient(to right, #fff, #a3f783);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .welcome-slogan {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 40px;
      font-weight: 600;
      line-height: 1.5;
    }
    .welcome-start-btn {
      background: #58cc02;
      color: white;
      border: none;
      padding: 14px 36px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 0 #46a302, 0 10px 20px rgba(0,0,0,0.3);
      transition: all 0.1s;
    }
    .welcome-start-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #46a302, 0 4px 10px rgba(0,0,0,0.3);
    }

    @media (max-height: 960px) { #phone-shell { transform: scale(0.94); transform-origin: center center; } }
    @media (max-height: 880px) { #phone-shell { transform: scale(0.86); transform-origin: center center; } }
    @media (max-height: 780px) { #phone-shell { transform: scale(0.76); transform-origin: center center; } }
    @media (max-height: 680px) { #phone-shell { transform: scale(0.66); transform-origin: center center; } }

    @media (max-width: 440px) {
      body { background: #fff; align-items: flex-start; justify-content: flex-start; overflow: hidden; padding: 0; }
      #root { padding: 0; }
      #phone-shell {
        width: 100vw !important; height: 100dvh !important;
        min-width: unset !important; min-height: unset !important;
        max-width: unset !important; max-height: unset !important;
        border-radius: 0 !important; box-shadow: none !important; transform: none !important;
      }
      #phone-shell::before, #phone-shell::after { display: none; }
      #app-inner { padding-top: env(safe-area-inset-top, 0px); padding-bottom: env(safe-area-inset-bottom, 0px); }
      .desktop-bg, .orb, .phone-label { display: none; }
    }

    @keyframes floatUp { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes slideUp { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
  </style>
</head>
<body>
  <div class="desktop-bg"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div id="root">
    <div id="phone-shell">
      <div id="app-inner">
        <div id="react-root">
          <div id="loading-screen" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(160deg,#0a1f0a,#0d3b0d,#1a5e1a); font-family:'Nunito',sans-serif; color:#fff; gap:16px;">
            <div style="font-size:52px; animation:floatUp 2s ease-in-out infinite">🕌</div>
            <div style="font-weight:900; font-size:22px; letter-spacing:2px">AKHLAQVERSE</div>
            <div style="font-size:13px; opacity:0.7">Memuat platform...</div>
            <div style="width:40px; height:40px; border:4px solid rgba(255,255,255,.2); border-top:4px solid #58cc02; border-radius:50%; animation:spin 0.8s linear infinite;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="phone-label">✦ AKHLAQVERSE ✦</div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

    const C = {

    };

    const QUIZZES = [
      { id:1, unit:"Unit 1", icon:"💬", color:C.blue, title:"Cyberbullying",
        bot:"Grup WhatsApp kelasmu ramai mengejek teman karena salah pakai seragam. Mereka kirim stiker merendahkan. Apa yang kamu lakukan?",

      { id:5, unit:"Unit 5", icon:"🎯", color:C.green, title:"Peer Pressure",

        choices:[
          {id:"A",text:"Ikut buat video demi jaga eksistensi.",type:"bad"},
          {id:"B",text:"Buat tapi set privat untuk geng saja.",type:"mid"},

        successHadith:"Tidak ada ketaatan kepada makhluk dalam kemaksiatan kepada Allah. Kamu merdeka secara spiritual!",

    // --- CURRICULUM QUESTIONS ---
    const S1_UNIT1_QUESTIONS = [
      { qid:"s1u1q1", bot:"Saat bermain bola di dalam rumah, kamu tidak sengaja menghilangkan/merusakkan vas bunga Ibu. Ibu menanyakan siapa pelakunya. Apa yang kamu lakukan?", choices:[{id:"A",text:"Menyalahkan kucing peliharaan."},{id:"B",text:"Diam saja sampai ada yang bertanya."},{id:"C",text:"Mengaku jujur & minta maaf kepada Ibu."}], correct:"C", concept:"Shidq", successMsg:"Luar biasa! Kejujuran adalah mahkota akhlak mulia.", successHadith:"'Sesungguhnya kejujuran membawa kepada kebaikan dan kebaikan membawa ke surga.' (HR. Bukhari)", failMsg:"Berbohong atau melarikan diri dari tanggung jawab merusak kepercayaan keluarga." },
      { qid:"s1u1q2", bot:"Teman sebangkumu menyodorkan kertas contekan saat ujian karena tahu kamu belum belajar. Tindakanmu?", choices:[{id:"A",text:"Menerima kertasnya dan menyalin jawaban."},{id:"B",text:"Menolak dengan sopan dan mengerjakan semampunya."},{id:"C",text:"Membiarkan kertas di atas meja tanpa dipakai."}], correct:"B", concept:"Shidq", successMsg:"Hebat! Menolak contekan adalah bentuk kejujuran akademik yang sesungguhnya.", successHadith:"'Barangsiapa menitu kami maka dia bukan golongan kami.' (HR. Muslim)", failMsg:"Menyontek merusak integritas dan tidak mencerminkan sifat siddiq seorang muslim." },
      { qid:"s1u1q3", bot:"Penjual kantin sekolah salah memberikan kembalian — lebih banyak Rp20.000 dari seharusnya. Apa yang kamu lakukan?", choices:[{id:"A",text:"Mengantongi uangnya karena itu kesalahan si penjual."},{id:"B",text:"Mengembalikan kelebihan uangnya saat itu juga."},{id:"C",text:"Menyumbangkan ke kotak amal sekolah."}], correct:"B", concept:"Shidq", successMsg:"Excellent! Mengembalikan hak orang lain adalah tanda hati yang bersih.", successHadith:"'Tunaikanlah amanah kepada orang yang memberi amanah kepadamu.' (HR. Abu Dawud)", failMsg:"Mengambil hak orang lain meski karena kesalahannya sendiri tetaplah tidak jujur." },
      { qid:"s1u1q4", bot:"Kamu merusakkan penggaris milik teman kelas yang kamu pinjam kemarin sore. Tindakanmu?", choices:[{id:"A",text:"Mengembalikan diam-diam ke tasnya tanpa berkata apapun."},{id:"B",text:"Jujur mengaku, minta maaf, dan menawarkan menggantikannya."},{id:"C",text:"Bilang kalau penggarisnya hilang entah kemana."}], correct:"B", concept:"Shidq", successMsg:"Keren! Mengakui dan mengganti kerusakan adalah bukti kejujuran dan tanggung jawab.", successHadith:"'Tanda-tanda orang munafik ada tiga... (HR. Bukhari)'", failMsg:"Menyembunyikan kerusakan atau berbohong tentangnya adalah bentuk pengkhianatan." },
      { qid:"s1u1q5", bot:"Kamu pulang terlambat karena keasyikan nongkrong, padahal pamitnya pergi belajar kelompok. Apa yang kamu katakan ke orang tua?", choices:[{id:"A",text:"Berbohong, bilang ban motor bocor di jalan."},{id:"B",text:"Jujur keasyikan ngobrol dan siap menerima konsekuensinya."},{id:"C",text:"Menangis pura-pura sakit supaya ortu kasihan."}], correct:"B", concept:"Shidq", successMsg:"Mantap! Mengakui kesalahan dan siap bertanggung jawab adalah keberanian sejati.", successHadith:"'Sesungguhnya orang jujur dicatat di sisi Allah sebagai orang shiddiq.'", failMsg:"Berbohong kepada orang tua merusak kepercayaan." },
      { qid:"s1u1q6", bot:"Kamu menemukan dompet berisi banyak uang tunai dan kartu identitas siswa lain tergeletak di koridor sekolah. Apa yang kamu lakukan?", choices:[{id:"A",text:"Ambil uangnya dan buang dompetnya."},{id:"B",text:"Serahkan dompet utuh ke pos satpam atau ruang guru."},{id:"C",text:"Biarkan saja tergeletak di lantai."}], correct:"B", concept:"Shidq", successMsg:"Sempurna! Menyerahkan barang temuan secara utuh adalah akhlak shidq.", successHadith:"Menyerahkan ke pihak berwenang adalah jalan amanah terbaik.", failMsg:"Mengambil uang dari dompet temuan sama dengan mencuri hak orang lain." },

    const S1_UNIT2_QUESTIONS = [

    // --- MINI WRAPPERS ---
    const Spark = ({data,color,h=32,w=80})=>{
      const max=Math.max(...data),min=Math.min(...data);
      const pts=data.map((v,i)=>{
        const x=(i/(data.length-1))*w;
        const y=h-((v-min)/(max-min||1))*(h-4)-2;
        return `${x},${y}`;
      }).join(" ");
      return(
        <svg width={w} height={h}>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
          {data.map((v,i)=>{
            const x=(i/(data.length-1))*w;
            const y=h-((v-min)/(max-min||1))*(h-4)-2;
            return <circle key={i} cx={x} cy={y} r="2.5" fill={color}/>;
          })}
        </svg>
      );
    };

                  {mockMissions.map((ms) => (
                    <div key={ms.id} style={{border:`2px solid ${C.border}`, borderRadius:18, padding:14, boxShadow:"0 2px 0 #eee"}}>
                      <div style={{display:"flex", justifyOrigin:"space-between", fontSize:11, fontWeight:800, color:C.muted}}>
                        <span>{ms.unit}</span>
                        <span>{ms.date}</span>
                      </div>
                      <h5 style={{fontWeight:900, fontSize:14, color:C.ink, marginTop:4}}>{ms.student}</h5>
                      <p style={{fontSize:13, color:C.ink2, marginTop:4, fontWeight:600, lineHeight:1.4}}>{ms.desc}</p>
                      
                      <div style={{marginTop:12, display:"flex", justifyOrigin:"flex-end"}}>
                        {ms.status === "approved" ? (
                          <span style={{background:C.greenBg, color:C.greenDk, padding:"4px 12px", borderRadius:8, fontSize:12, fontWeight:900}}>✓ Sudah Terkonfirmasi</span>
                        ) : (
                          <button onClick={() => handleApproveMission(ms.id)} style={{background:C.teal, color:"#fff", border:"none", padding:"6px 14px", borderRadius:8, fontSize:12, fontWeight:900, cursor:"pointer"}}>
                            Ya, Anak Melakukannya 👍
                          </button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Logout parent */}
            <div style={{padding:12, borderTop:`2px solid ${C.border}`}}>
              <button onClick={()=>setView("login")} style={{width:"100%", background:C.surface, border:"none", padding:10, borderRadius:12, color:C.ink2, fontWeight:800, fontSize:13, cursor:"pointer"}}>Keluar Sesi Orang Tua</button>
            </div>
          </div>
        );
      }
    }

    const container = document.getElementById('react-root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
