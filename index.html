<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>AKHLAQVERSE — Platform Akhlak Digital</title>

  <!-- React 18 + ReactDOM 18 (Cdn Produksi) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>

  <style>
    /* ── RESET & BASE ── */
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #000; overflow: hidden; font-family: 'Plus Jakarta Sans', sans-serif; }

    /* ── IPHONE MOCKUP FRAME (FIXED & ANTI BOCOR) ── */
    #root-wrapper {
      display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw;
    }

    #phone-shell {
      width: 390px; height: 844px; background: #fff; border-radius: 55px;
      position: relative; overflow: hidden; /* Kunci konten di dalam lengkungan */
      box-shadow: 
        0 0 0 12px #1a1a1a, 
        0 0 0 15px #333, 
        0 40px 100px rgba(0,0,0,0.6);
      display: flex; flex-direction: column;
    }

    /* Notch & Home Indicator */
    #phone-shell::before {
      content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 160px; height: 32px; background: #1a1a1a; 
      border-bottom-left-radius: 20px; border-bottom-right-radius: 20px; z-index: 9999;
    }
    #phone-shell::after {
      content: ''; position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 5px; background: rgba(0,0,0,0.1); border-radius: 10px; z-index: 9999;
    }

    /* ── APP CONTENT AREA ── */
    #app-render {
      flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; position: relative;
    }

    /* Scrollable internal area */
    .scroll-container {
      flex: 1; overflow-y: auto; overflow-x: hidden; scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch; padding-top: 40px; padding-bottom: 25px;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    /* ── ANIMATIONS ── */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
    @keyframes shake { 0%,100% {transform:translateX(0)} 25% {transform:translateX(-6px)} 75% {transform:translateX(6px)} }
    @keyframes pulse-glow { 0% { box-shadow: 0 0 0 0 rgba(88,204,2,0.4); } 70% { box-shadow: 0 0 0 15px rgba(88,204,2,0); } 100% { box-shadow: 0 0 0 0 rgba(88,204,2,0); } }

    /* ── UI HELPERS ── */
    .btn-3d {
      position: relative; border: none; border-radius: 18px; font-weight: 800; cursor: pointer;
      transition: all 0.1s; transform: translateY(0); display: flex; align-items: center; justify-content: center;
    }
    .btn-3d:active { transform: translateY(4px); }
    .soft-shadow { box-shadow: 0 10px 30px -5px rgba(0,0,0,0.1); }
    
    input::placeholder { color: rgba(0,0,0,0.3); }

    /* Desktop View Responsiveness */
    @media (max-height: 850px) { #phone-shell { transform: scale(0.9); } }
    @media (max-height: 750px) { #phone-shell { transform: scale(0.8); } }
    @media (max-width: 450px) {
      body { background: #fff; }
      #phone-shell { width: 100vw; height: 100vh; border-radius: 0; box-shadow: none; transform: scale(1) !important; }
      #phone-shell::before, #phone-shell::after { display: none; }
    }
  </style>
</head>
<body>

  <div id="root-wrapper">
    <div id="phone-shell">
      <div id="app-render"></div>
    </div>
  </div>

  <script>
    const h = React.createElement;
    const { useState, useEffect, useRef } = React;

    // ─── PALETTE ───
    const C = {
      green:"#58cc02", greenDk:"#46a302", greenBg:"#e8fcd4",
      blue:"#1cb0f6",  blueDk:"#0891d4",  blueBg:"#e0f5ff",
      gold:"#ffc800",  goldDk:"#e6a800",  goldBg:"#fff8e0",
      red:"#ff4b4b",   redDk:"#cc0000",   redBg:"#ffe5e5",
      purple:"#ce82ff",purpleBg:"#f5eaff",
      ink:"#1f1f1f",   ink2:"#4b4b4b",    muted:"#afafaf",
      surface:"#f7f7f7", white:"#ffffff", border:"#e8e8e8"
    };

    // ─── FULL QUIZ DATA (ORIGINAL) ───
    const QUIZZES = [
      { id:1, unit:"Unit 1", icon:"💬", color:C.blue, title:"Cyberbullying",
        bot:"Grup WhatsApp kelasmu ramai mengejek teman karena salah pakai seragam. Apa yang kamu lakukan?",
        choices:[
          {id:"A",text:"Ikut kirim stiker lucu biar dianggap kompak."},
          {id:"B",text:"Diam saja sebagai silent reader."},
          {id:"C",text:"Tegur sopan di grup, kirim DM ke korban untuk menguatkan."}
        ], correct:"C", concept:"Muru'ah", points:20,
        successHadith:"'Seorang muslim adalah seseorang yang muslim lainnya selamat dari lisan & tangannya.' (HR. Bukhari)",
        failMsg:"Diam atau ikut-ikutan merusak ukhuwah Islamiyah."
      },
      { id:2, unit:"Unit 2", icon:"📰", color:"#00c8a0", title:"Anti-Hoaks",
        bot:"Pesan berantai menyebar di grup keluarga: 'Jajanan sekolah X berbahaya!' Tidak ada sumber resmi. Tindakanmu?",
        choices:[
          {id:"A",text:"Langsung sebarkan agar dianggap peduli."},
          {id:"B",text:"Diamkan saja tanpa konfirmasi."},
          {id:"C",text:"Tahan, cek di sumber resmi, larang orang tua menyebarkan sebelum valid."}
        ], correct:"C", concept:"Tabayyun", points:20,
        successHadith:"QS. Al-Hujurat 49:6 — 'Jika datang kepadamu orang fasik membawa berita, periksalah dengan teliti...'",
        failMsg:"Menyebar tanpa verifikasi berpotensi fitnah."
      },
      { id:3, unit:"Unit 3", icon:"🎮", color:C.purple, title:"Toxic Gaming",
        bot:"Timmu kalah game karena satu teman error. Anggota lain memaki di chat. Bagaimana ketahanan adabmu?",
        choices:[
          {id:"A",text:"Ikut memaki untuk meluapkan kekesalan."},
          {id:"B",text:"Diam tapi dalam hati mengutuk."},
          {id:"C",text:"Mute pemain toxic, ketik semangat: 'Gapapa, next game lebih kompak!'"}
        ], correct:"C", concept:"Kadhmin al-Ghaizh", points:20,
        successHadith:"'Orang kuat adalah yang mampu menahan dirinya saat marah.' (HR. Bukhari)",
        failMsg:"Lisan kotor mencerminkan hati yang rapuh."
      },
      { id:4, unit:"Unit 4", icon:"🔒", color:C.gold, title:"Privasi Digital",
        bot:"Kamu tidak sengaja dapat screenshot aib teman. Sahabatmu memaksa minta: 'Cuma mau tahu!' Tindakanmu?",
        choices:[
          {id:"A",text:"Kasih dengan syarat 'jangan disebar lagi'."},
          {id:"B",text:"Hapus screenshot tapi ceritakan garis besarnya."},
          {id:"C",text:"Tolak, hapus file, ingatkan temanmu tentang larangan ghibah digital."}
        ], correct:"C", concept:"Hifzhul Aurat", points:20,
        successHadith:"'Barangsiapa menutupi aib seorang muslim, Allah tutupi aibnya di dunia & akhirat.' (HR. Muslim)",
        failMsg:"Aib digital meninggalkan jejak abadi."
      },
      { id:5, unit:"Unit 5", icon:"🎯", color:C.green, title:"Peer Pressure",
        bot:"Gengmu bikin TikTok challenge berbahaya. Mereka tag akunmu: 'Kalau gak ikut, keluar grup!' Responsmu?",
        choices:[
          {id:"A",text:"Ikut buat video demi jaga eksistensi."},
          {id:"B",text:"Buat tapi set privat untuk geng saja."},
          {id:"C",text:"Tolak tegas & sopan — pertemanan bukan soal kepatuhan buta."}
        ], correct:"C", concept:"Izzah", points:20,
        successHadith:"Tidak ada ketaatan kepada makhluk dalam kemaksiatan kepada Allah.",
        failMsg:"Mengorbankan akhlak demi pengakuan semu adalah kerapuhan mental."
      }
    ];

    const STUDENTS = [
      {id:1,name:"Fatimah Az-Zahra",grade:"8A",gems:340,streak:12,hearts:5,doneUnits:3,alert:false,journal:"Hari ini saya membantu teman..."},
      {id:2,name:"Ahmad Fauzi",grade:"8A",gems:180,streak:5,hearts:3,doneUnits:2,alert:false,journal:""},
      {id:3,name:"Siti Maryam",grade:"8B",gems:60,streak:2,hearts:1,doneUnits:1,alert:true,journal:""}
    ];

    // ─── COMPONENTS ───

    const Toast = ({msg, show}) => 
      h('div', { style: {
        position:'fixed', top:60, left:'50%', transform:`translateX(-50%) translateY(${show?0:-100}px)`,
        transition:'transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)', zIndex:10000,
        background:C.ink, color:'#fff', padding:'12px 24px', borderRadius:20, fontWeight:800, fontSize:13,
        boxShadow:'0 10px 30px rgba(0,0,0,0.3)', whiteSpace:'nowrap'
      }}, msg);

    // ─── SCREEN: WELCOME ───
    const WelcomeScreen = ({onStart}) => {
      return h('div', { 
        style: { 
          flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
          background:'linear-gradient(160deg, #0f172a 0%, #1e293b 100%)', padding:40, textAlign:'center'
        }
      },
        h('div', { style: { animation:'float 3s ease-in-out infinite', fontSize:100, marginBottom:20 }}, '🕌'),
        h('h1', { style: { color:'#fff', fontSize:36, fontWeight:900, letterSpacing:2, marginBottom:10, fontFamily:"'Nunito'" }}, 'AKHLAQVERSE'),
        h('p', { style: { color:'#94a3b8', fontSize:16, marginBottom:60, lineHeight:1.6, fontWeight:600 }}, 'Platform Pendidikan Akhlak Digital Berbasis Adab & Karakter'),
        h('button', {
          onClick: onStart,
          className: 'btn-3d',
          style: { 
            background:C.green, color:'#fff', padding:'22px 40px', fontSize:18,
            boxShadow:`0 6px 0 ${C.greenDk}`, width:'100%', animation:'pulse-glow 2s infinite'
          }
        }, 'Mulai Belajar 🚀')
      );
    };

    // ─── SCREEN: LOGIN / SELECT ───
    const RoleSelection = ({onLogin}) => {
      const [active, setActive] = useState('student');
      const roles = [
        { id: 'student', label: 'Siswa', icon: '🎒', color: C.green },
        { id: 'teacher', label: 'Guru', icon: '👨‍🏫', color: C.blue },
        { id: 'parent', label: 'Ortu', icon: '👪', color: C.gold }
      ];

      return h('div', { className:'scroll-container', style: { background:'#f8fafc', padding:25 }},
        h('h2', { style: { fontWeight:900, fontSize:28, color:C.ink, marginTop:30, marginBottom:8 }}, 'Selamat Datang'),
        h('p', { style: { color:'#64748b', marginBottom:35, fontWeight:600 }}, 'Pilih peran untuk melanjutkan'),
        
        // Segmented Control
        h('div', { style: { 
          background:'#e2e8f0', borderRadius:22, padding:6, display:'flex', marginBottom:40,
          position:'relative', height:64
        }},
          roles.map(r => h('button', {
            key: r.id,
            onClick: () => setActive(r.id),
            style: {
              flex:1, border:'none', background:'transparent', zIndex:2, cursor:'pointer',
              fontWeight:800, color: active === r.id ? '#fff' : '#64748b', transition:'0.3s',
              fontSize:14, fontFamily:"'Plus Jakarta Sans'"
            }
          }, r.label)),
          // Indicator
          h('div', { style: {
            position:'absolute', top:6, bottom:6, borderRadius:18,
            width:'calc(33.33% - 8px)', transition:'0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)',
            background: roles.find(r => r.id === active).color,
            left: active === 'student' ? 6 : active === 'teacher' ? '33.33%' : '66.66%',
            boxShadow:'0 4px 12px rgba(0,0,0,0.1)'
          }})
        ),

        h('div', { style: { display:'flex', flexDirection:'column', gap:15 }},
          h('input', { placeholder:'Email Terdaftar', style: { padding:18, borderRadius:16, border:'2px solid #e2e8f0', outline:'none', fontSize:15, fontWeight:600 }}),
          h('input', { type:'password', placeholder:'Kata Sandi', style: { padding:18, borderRadius:16, border:'2px solid #e2e8f0', outline:'none', fontSize:15, fontWeight:600 }}),
          h('button', {
            onClick: () => onLogin(active),
            className: 'btn-3d',
            style: { 
              marginTop:10, background: roles.find(r => r.id === active).color, color:'#fff',
              padding:20, fontSize:16, boxShadow: `0 6px 0 rgba(0,0,0,0.1)`
            }
          }, `Masuk Sebagai ${active.charAt(0).toUpperCase() + active.slice(1)}`)
        )
      );
    };

    // ─── SCREEN: STUDENT DASHBOARD ───
    const StudentDashboard = ({onLogout, onQuiz}) => {
      const [hearts] = useState(5);
      const [gems] = useState(120);

      return h('div', { style: { flex:1, display:'flex', flexDirection:'column', background:'#fff' }},
        // Header
        h('div', { style: { display:'flex', justifyContent:'space-between', padding:'15px 20px', borderBottom:`2px solid ${C.border}` }},
          h('div', { style: { display:'flex', gap:10 }},
            h('span', { style: { fontWeight:900, color:C.gold }}, `🔥 12`),
            h('span', { style: { fontWeight:900, color:C.blue }}, `💎 ${gems}`)
          ),
          h('div', { style: { display:'flex', gap:4 }}, 
            [...Array(5)].map((_,i) => h('span', { key:i }, '❤️'))
          )
        ),
        h('div', { className:'scroll-container', style: { padding:20 }},
          h('div', { style: { background:`linear-gradient(135deg, ${C.green}, ${C.greenDk})`, padding:20, borderRadius:24, color:'#fff', marginBottom:25, boxShadow:`0 10px 20px ${C.green}33` }},
            h('div', { style: { fontSize:12, fontWeight:800, opacity:0.8, marginBottom:4 }}, 'PROGRESS ANDA'),
            h('h2', { style: { fontSize:22, fontWeight:900, marginBottom:10 }}, 'Bagian 2: Adab Digital'),
            h('div', { style: { height:8, background:'rgba(255,255,255,0.2)', borderRadius:10 }},
              h('div', { style: { width:'60%', height:'100%', background:'#fff', borderRadius:10 }})
            )
          ),
          h('h3', { style: { fontWeight:900, fontSize:18, marginBottom:20 }}, 'Materi Akhlak'),
          QUIZZES.map((q, idx) => h('div', {
            key: q.id,
            onClick: () => onQuiz(idx),
            style: { 
              display:'flex', alignItems:'center', padding:18, borderRadius:20, border:`2px solid ${C.border}`,
              marginBottom:12, cursor:'pointer'
            }
          },
            h('div', { style: { width:45, height:45, borderRadius:12, background:q.color, display:'flex', alignItems:'center', justifyContent:'center', fontSize:22, marginRight:15, color:'#fff' }}, q.icon),
            h('div', { style: { flex:1 }},
              h('div', { style: { fontWeight:900, fontSize:15 }}, q.title),
              h('div', { style: { fontSize:12, color:C.muted, fontWeight:700 }}, q.concept)
            ),
            h('span', { style: { fontSize:20 }}, idx < 2 ? '✅' : '▶️')
          ))
        ),
        // Bottom Nav
        h('div', { style: { display:'flex', justifyContent:'space-around', padding:'15px 0', borderTop:`2px solid ${C.border}` }},
          h('span', { style: { fontSize:24, cursor:'pointer' }}, '🏠'),
          h('span', { style: { fontSize:24, cursor:'pointer' }}, '🏆'),
          h('span', { onClick:onLogout, style: { fontSize:24, cursor:'pointer' }}, '👤')
        )
      );
    };

    // ─── SCREEN: QUIZ INTERFACE ───
    const QuizScreen = ({quizIdx, onFinish, currentHearts, updateHearts}) => {
      const q = QUIZZES[quizIdx];
      const [selected, setSelected] = useState(null);
      const [revealed, setRevealed] = useState(false);
      const [shake, setShake] = useState(false);
      const [cooldown, setCooldown] = useState(0);

      // Timer Logic
      useEffect(() => {
        let timer;
        if (currentHearts === 0) {
          setCooldown(300); // 5 menit
          timer = setInterval(() => {
            setCooldown(c => {
              if (c <= 1) { updateHearts(1); return 0; }
              return c - 1;
            });
          }, 1000);
        }
        return () => clearInterval(timer);
      }, [currentHearts]);

      const formatTime = (s) => `${Math.floor(s/60)}:${(s%60).toString().padStart(2, '0')}`;

      const handleCheck = (id) => {
        if (revealed || currentHearts === 0) return;
        setSelected(id);
        if (id === q.correct) {
          setRevealed(true);
        } else {
          setShake(true);
          updateHearts(currentHearts - 1);
          setTimeout(() => setShake(false), 500);
        }
      };

      if (currentHearts === 0) {
        return h('div', { style: { flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:40, textAlign:'center' }},
          h('div', { style: { fontSize:80, marginBottom:20 }}, '💔'),
          h('h2', { style: { fontWeight:900, fontSize:26 }}, 'Nyawa Habis!'),
          h('p', { style: { color:'#64748b', marginTop:10, marginBottom:30, fontWeight:600 }}, 'Tenang, nyawa akan terisi kembali dalam:'),
          h('div', { style: { fontSize:40, fontWeight:900, color:C.red, background:C.redBg, padding:'20px 40px', borderRadius:25, border:`3px solid ${C.red}` }}, formatTime(cooldown)),
          h('button', { onClick: onFinish, style: { marginTop:50, background:'none', border:'none', color:C.muted, fontWeight:800, cursor:'pointer', textDecoration:'underline' }}, 'Kembali ke Beranda')
        );
      }

      return h('div', { style: { flex:1, display:'flex', flexDirection:'column', background:'#fff' }},
        // Top Header
        h('div', { style: { padding:'15px 20px', display:'flex', alignItems:'center', justifyContent:'space-between', borderBottom:`2px solid ${C.border}` }},
          h('button', { onClick: onFinish, style: { background:'none', border:'none', fontSize:24, cursor:'pointer' }}, '✕'),
          h('div', { style: { display:'flex', gap:4 }},
            [...Array(5)].map((_, i) => h('span', { key:i, style: { fontSize:20, opacity: i < currentHearts ? 1 : 0.2 }}, '❤️'))
          )
        ),
        h('div', { className:'scroll-container', style: { padding:25, animation: shake ? 'shake 0.4s ease' : 'none' }},
          h('div', { style: { background:C.blueBg, color:C.blueDk, padding:'6px 14px', borderRadius:10, display:'inline-block', fontSize:12, fontWeight:800, marginBottom:20 }}, `${q.unit.toUpperCase()} · ${q.concept}`),
          h('h3', { style: { fontSize:22, fontWeight:900, color:C.ink, lineHeight:1.5, marginBottom:35 }}, q.bot),
          h('div', { style: { display:'flex', flexDirection:'column', gap:15 }},
            q.choices.map(opt => {
              const isWrong = selected === opt.id && opt.id !== q.correct;
              const isRight = revealed && opt.id === q.correct;
              return h('button', {
                key: opt.id,
                onClick: () => handleCheck(opt.id),
                className: 'btn-3d',
                style: {
                  textAlign:'left', padding:20, borderRadius:20, justifyContent:'flex-start',
                  border:`2px solid ${isRight ? C.green : isWrong ? C.red : C.border}`,
                  background: isRight ? C.greenBg : isWrong ? C.redBg : '#fff',
                  boxShadow: `0 4px 0 ${isRight ? C.greenDk : isWrong ? C.redDk : C.border}`
                }
              },
                h('div', { style: { width:32, height:32, borderRadius:8, marginRight:15, background: isRight ? C.green : isWrong ? C.red : C.surface, color: (isRight || isWrong) ? '#fff' : C.muted, display:'flex', alignItems:'center', justifyContent:'center', fontWeight:900 }}, opt.id),
                h('span', { style: { fontWeight:800, fontSize:15, color:C.ink2 }}, opt.text)
              )
            })
          )
        ),
        // Feedback Banner
        revealed && h('div', { style: { background:C.greenBg, padding:'30px 25px', borderRadius:'30px 30px 0 0', boxShadow:'0 -10px 40px rgba(0,0,0,0.05)', animation:'fadeIn 0.3s ease' }},
          h('h4', { style: { color:C.greenDk, fontWeight:900, fontSize:20, marginBottom:8 }}, 'Akhlaqul Karimah! ✨'),
          h('p', { style: { fontSize:14, color:C.greenDk, marginBottom:25, lineHeight:1.6, fontWeight:700 }}, q.successHadith),
          h('button', { onClick: onFinish, className:'btn-3d', style: { width:'100%', background:C.green, color:'#fff', padding:18, boxShadow:`0 6px 0 ${C.greenDk}`, fontSize:16 }}, 'Lanjutkan Materi')
        )
      );
    };

    // ─── SCREEN: TEACHER DASHBOARD ───
    const TeacherDashboard = ({onLogout}) => {
      return h('div', { style: { flex:1, display:'flex', flexDirection:'column', background:'#f8fafc' }},
        h('div', { style: { background:`linear-gradient(135deg, ${C.blue}, ${C.blueDk})`, padding:'25px 20px 20px', color:'#fff' }},
          h('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center' }},
            h('div', null,
              h('div', { style: { fontSize:12, fontWeight:800, opacity:0.8 }}, 'DASBOR GURU PAI'),
              h('h2', { style: { fontSize:22, fontWeight:900 }}, 'Ustadz Ahmad Fauzi')
            ),
            h('button', { onClick:onLogout, style: { background:'rgba(255,255,255,0.2)', border:'none', color:'#fff', padding:'8px 15px', borderRadius:12, fontWeight:800, cursor:'pointer' }}, 'Keluar')
          )
        ),
        h('div', { className:'scroll-container', style: { padding:20 }},
          h('div', { style: { background:'#fff', borderRadius:20, padding:20, marginBottom:20, border:`1px solid ${C.border}` }},
            h('h3', { style: { fontWeight:900, marginBottom:15, fontSize:16 }}, 'Statistik Kelas 8A'),
            h('div', { style: { display:'grid', gridTemplateColumns:'1fr 1fr', gap:10 }},
              h('div', { style: { background:C.blueBg, padding:15, borderRadius:15 }}, 
                h('div', { style: { fontSize:22, fontWeight:900, color:C.blueDk }}, '24'),
                h('div', { style: { fontSize:10, fontWeight:800, color:C.blueDk }}, 'Siswa Aktif')
              ),
              h('div', { style: { background:C.greenBg, padding:15, borderRadius:15 }}, 
                h('div', { style: { fontSize:22, fontWeight:900, color:C.greenDk }}, '86%'),
                h('div', { style: { fontSize:10, fontWeight:800, color:C.greenDk }}, 'Kepatuhan Adab')
              )
            )
          ),
          h('h4', { style: { fontWeight:900, fontSize:15, marginBottom:15 }}, 'Monitoring Siswa'),
          STUDENTS.map(s => h('div', { key:s.id, style: { display:'flex', alignItems:'center', background:'#fff', padding:15, borderRadius:18, marginBottom:10, border:`1px solid ${s.alert?C.red:C.border}` }},
            h('div', { style: { width:40, height:40, borderRadius:'50%', background:C.surface, display:'flex', alignItems:'center', justifyContent:'center', marginRight:12, fontSize:20 }}, '👤'),
            h('div', { style: { flex:1 }},
              h('div', { style: { fontWeight:800, fontSize:14 }}, s.name),
              h('div', { style: { fontSize:11, color:C.muted, fontWeight:700 }}, `${s.grade} · ${s.gems} Gems`)
            ),
            h('div', { style: { textAlign:'right' }},
              h('div', { style: { fontSize:12, fontWeight:900, color:s.alert?C.red:C.green }}, s.alert?'⚠️ Alert':'Aman')
            )
          ))
        )
      );
    };

    // ─── SCREEN: PARENT DASHBOARD ───
    const ParentDashboard = ({onLogout}) => {
      return h('div', { style: { flex:1, display:'flex', flexDirection:'column', background:'#f8fafc' }},
        h('div', { style: { background:`linear-gradient(135deg, ${C.gold}, ${C.goldDk})`, padding:'25px 20px 20px', color:'#fff' }},
          h('div', { style: { display:'flex', justifyContent:'space-between', alignItems:'center' }},
            h('div', null,
              h('div', { style: { fontSize:12, fontWeight:800, opacity:0.8 }}, 'PEMANTAUAN ORANG TUA'),
              h('h2', { style: { fontSize:22, fontWeight:900 }}, 'Bunda Fatimah')
            ),
            h('button', { onClick:onLogout, style: { background:'rgba(255,255,255,0.2)', border:'none', color:'#fff', padding:'8px 15px', borderRadius:12, fontWeight:800, cursor:'pointer' }}, 'Keluar')
          )
        ),
        h('div', { className:'scroll-container', style: { padding:20 }},
          h('div', { style: { background:'#fff', borderRadius:24, padding:20, marginBottom:20, textAlign:'center', border:`1px solid ${C.border}` }},
            h('div', { style: { fontSize:40, marginBottom:10 }}, '🧕'),
            h('h3', { style: { fontWeight:900, fontSize:18 }}, 'Progress Ananda Zahra'),
            h('p', { style: { fontSize:13, color:C.muted, fontWeight:700, marginBottom:15 }}, 'Kelas 8A · Akhlaqul Karimah'),
            h('div', { style: { display:'flex', gap:10, justifyContent:'center' }},
              h('div', { style: { background:C.surface, padding:'8px 15px', borderRadius:12, fontSize:12, fontWeight:800 }}, '🔥 12 Hari'),
              h('div', { style: { background:C.surface, padding:'8px 15px', borderRadius:12, fontSize:12, fontWeight:800 }}, '💎 340 AP')
            )
          ),
          h('div', { style: { background:C.greenBg, padding:20, borderRadius:20, marginBottom:20 }},
            h('h4', { style: { color:C.greenDk, fontWeight:900, fontSize:14, marginBottom:5 }}, '✅ Misi Terverifikasi'),
            h('p', { style: { color:C.greenDk, fontSize:12, fontWeight:700, lineHeight:1.5 }}, 'Zahra berhasil mempraktikkan Tabayyun saat menerima berita hoaks di grup keluarga.')
          )
        )
      );
    };

    // ─── MAIN APP CONTROLLER ───
    function App() {
      const [screen, setScreen] = useState('welcome');
      const [hearts, setHearts] = useState(5);
      const [activeQuiz, setActiveQuiz] = useState(null);
      const [toast, setToast] = useState({show:false, msg:''});

      const showToast = (msg) => {
        setToast({show:true, msg});
        setTimeout(() => setToast({show:false, msg:''}), 2500);
      };

      const handleLogin = (role) => {
        showToast(`Login berhasil sebagai ${role}`);
        setTimeout(() => setScreen(role), 500);
      };

      const handleStartQuiz = (idx) => {
        setActiveQuiz(idx);
        setScreen('quiz-active');
      };

      // Strict Routing
      const renderScreen = () => {
        switch(screen) {
          case 'welcome': 
            return h(WelcomeScreen, { onStart: () => setScreen('select') });
          case 'select': 
            return h(RoleSelection, { onLogin: handleLogin });
          case 'student': 
            return h(StudentDashboard, { onLogout: () => setScreen('select'), onQuiz: handleStartQuiz });
          case 'teacher': 
            return h(TeacherDashboard, { onLogout: () => setScreen('select') });
          case 'parent': 
            return h(ParentDashboard, { onLogout: () => setScreen('select') });
          case 'quiz-active':
            return h(QuizScreen, { 
              quizIdx: activeQuiz, 
              currentHearts: hearts, 
              updateHearts: setHearts,
              onFinish: () => setScreen('student') 
            });
          default: 
            return h(WelcomeScreen, { onStart: () => setScreen('select') });
        }
      };

      return h('div', { id: 'app-render' }, 
        h(Toast, { msg: toast.msg, show: toast.show }),
        renderScreen()
      );
    }

    // ─── MOUNT ───
    const root = ReactDOM.createRoot(document.getElementById('app-render'));
    root.render(h(App));
  </script>
</body>
</html>
