  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f0f0f;
      /* Center the phone shell */
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: auto; /* allow page scroll on very short viewports */
    }

    /* ── DESKTOP: just a centering wrapper ── */
    #root {
      display: flex;
      align-items: center;
      justify-content: center;
      /* No height/width constraints here — shell is self-sized */
      padding: 20px 0; /* breathing room top+bottom */
    }

    /* ═══════════════════════════════════════
       FIXED PHONE SHELL — 402 × 874 px
       NEVER grows or shrinks
    ═══════════════════════════════════════ */
    #phone-shell {
      /* Hard-locked dimensions */
      width:  402px;
      height: 874px;
      min-width:  402px;
      min-height: 874px;
      max-width:  402px;
      max-height: 874px;

      /* iPhone-style frame */
      background: #fff;
      border-radius: 52px;
      overflow: hidden;
      flex-shrink: 0;
      position: relative;

      /* Stack children as flex column so app-inner fills the space */
      display: flex;
      flex-direction: column;

      /* Outer chrome ring + shadow */
      box-shadow:
        0 0 0 2px  #555,
        0 0 0 11px #1a1a1a,
        0 0 0 13px #3a3a3a,
        0 40px 100px rgba(0,0,0,.85),
        0  0   80px rgba(99,102,241,.15);
    }

    /* Dynamic island / notch */
    #phone-shell::before {
      content: '';
      position: absolute;
      top: 12px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 30px;
      background: #1a1a1a;
      border-radius: 20px;
      z-index: 9999;
      pointer-events: none;
    }

    /* Home indicator */
    #phone-shell::after {
      content: '';
      position: absolute;
      bottom: 10px; left: 50%;
      transform: translateX(-50%);
      width: 120px; height: 5px;
      background: rgba(0,0,0,.35);
      border-radius: 3px;
      z-index: 9999;
      pointer-events: none;
    }

    /* ── app-inner: fills shell, pads past notch & home bar ── */
    #app-inner {
      /* Fill the shell exactly — no flex-grow tricks */
      width:  100%;
      height: 100%;
      overflow: hidden;

      /* Pad content away from hardware chrome */
      padding-top:    42px;  /* clears dynamic island */
      padding-bottom: 22px;  /* clears home indicator */

      /* Flex column so react-root can flex:1 inside */
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
    }

    /* ── react-root: the React app lives here — fills remaining height ── */
    #react-root {
      /* Take ALL remaining height after padding — never grow beyond it */
      flex: 1;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;

      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Background wallpaper behind the phone */
    .desktop-bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 30% 40%, #1a237e44 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 70%, #4a148c33 0%, transparent 60%),
                  linear-gradient(135deg, #0a0a0a 0%, #111827 100%);
      z-index: -1;
    }

    /* Decorative blurred orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      pointer-events: none;
      z-index: -1;
    }
    .orb-1 { width:400px;height:400px;background:#1cb0f6;top:-100px;left:-100px; }
    .orb-2 { width:350px;height:350px;background:#58cc02;bottom:-80px;right:-80px; }
    .orb-3 { width:250px;height:250px;background:#ce82ff;top:40%;right:5%; }

    /* Tiny brand label under the phone */
    .phone-label {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,.25);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-family: 'Nunito', sans-serif;
      white-space: nowrap;
      z-index: 1;
    }

    /* ── Scale the fixed 402×874 shell to fit smaller desktop screens ── */
    @media (max-height: 960px) {
      #phone-shell { transform: scale(0.94); transform-origin: center center; }
    }
    @media (max-height: 880px) {
      #phone-shell { transform: scale(0.86); transform-origin: center center; }
    }
    @media (max-height: 780px) {
      #phone-shell { transform: scale(0.76); transform-origin: center center; }
    }
    @media (max-height: 680px) {
      #phone-shell { transform: scale(0.66); transform-origin: center center; }
    }

    /* ── On actual phone: full-screen native feel ── */
    @media (max-width: 440px) {
      body {
        background: #fff;
        align-items: flex-start;
        justify-content: flex-start;
        overflow: hidden;
        padding: 0;
      }
      #root { padding: 0; }
      #phone-shell {
        /* Override the fixed size with viewport fill */
        width:      100vw  !important;
        height:     100dvh !important;
        min-width:  unset  !important;
        min-height: unset  !important;
        max-width:  unset  !important;
        max-height: unset  !important;
        border-radius: 0   !important;
        box-shadow:  none  !important;
        transform:   none  !important;
      }
      #phone-shell::before, #phone-shell::after { display: none; }
      #app-inner {
        padding-top:    env(safe-area-inset-top,    0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .desktop-bg, .orb, .phone-label { display: none; }
    }

    @keyframes pulse       { 0%,100%{transform:scale(1);opacity:.8} 50%{transform:scale(1.15);opacity:.35} }
    @keyframes slideUp     { from{transform:translateY(60px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes slideDown   { from{transform:translateY(-10px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes popIn       { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
    @keyframes floatUp     { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes shake       { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
    @keyframes spin        { to{transform:rotate(360deg)} }
    @keyframes heartLost   { 0%{transform:scale(1)} 50%{transform:scale(1.4)} 100%{transform:scale(1)} }

    input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px rgba(255,255,255,.08) inset !important;
      -webkit-text-fill-color: #fff !important;

// ─── MINI SPARKLINE ───────────────────────────────────────────
const Spark = ({data,color,h=32,w=80})=>{
  const max=Math.max(...data),min=Math.min(...data);
  const pts=data.map((v,i)=>{
    const x=(i/(data.length-1))*w;
    const y=h-((v-min)/(max-min||1))*(h-4)-2;
    return `${x},${y}`;
  }).join(" ");
  return(
    <svg width={w} height={h}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      {data.map((v,i)=>{
        const x=(i/(data.length-1))*w;
        const y=h-((v-min)/(max-min||1))*(h-4)-2;
        return <circle key={i} cx={x} cy={y} r="2.5" fill={color}/>;
      })}
    </svg>
  );
};

const StudentDashboard = ({ onSwitch }) => {
  const [hearts, setHearts] = useState(5);
  const [gems, setGems] = useState(120);
  const [streak] = useState(12);
  const [currentSection, setCurrentSection] = useState(2);
  const [sectionNodeStates, setSectionNodeStates] = useState({
    1: ["active","locked","locked"],
    2: QUIZZES.map((_,i) => i===0 ? "active" : "locked"),
    3: ["active","locked","locked"],
  });
  const [sectionDone, setSectionDone] = useState({ 1:false, 2:false, 3:false });
  // activeQuiz: { secId, nodeIdx, questionIdx }
  const [activeQuiz, setActiveQuiz] = useState(null);
  const [quizState, setQuizState] = useState({ selected:null, revealed:false });
  const [toastMsg, setToastMsg] = useState("");
  const [toastShow, setToastShow] = useState(false);
  const [modal, setModal] = useState(null);
  const [journalText, setJournalText] = useState("");
  const [journalSaved, setJournalSaved] = useState(false);

  const ff = "'Nunito',sans-serif";
  const sec = SECTION_DATA[currentSection];
  const nodeStates = sectionNodeStates[currentSection];

  const toast = (msg) => { setToastMsg(msg); setToastShow(true); setTimeout(() => setToastShow(false), 2200); };

  // Resolve current question: if node has questions[] use it, else treat node itself as 1-question
  const getQuestion = (secId, nodeIdx, qIdx) => {
    const node = SECTION_DATA[secId].nodes[nodeIdx];
    if (node.questions) return node.questions[qIdx];
    return node; // legacy single-question node
  };
  const getTotalQuestions = (secId, nodeIdx) => {
    const node = SECTION_DATA[secId].nodes[nodeIdx];
    return node.questions ? node.questions.length : 1;
  };

  const openQuiz = (secId, nodeIdx) => {
    const ns = sectionNodeStates[secId];
    if (ns[nodeIdx] === "locked") { toast("🔒 Selesaikan unit sebelumnya dulu!"); return; }
    if (ns[nodeIdx] === "done")   { toast("✅ Unit ini sudah selesai!"); return; }
    setActiveQuiz({ secId, nodeIdx, questionIdx:0 });
    setQuizState({ selected:null, revealed:false });
  };

  const confirmAnswer = () => {
    if (!quizState.selected) return;
    setQuizState(s => ({ ...s, revealed:true }));
  };

  const nextAfterAnswer = () => {
    const { secId, nodeIdx, questionIdx } = activeQuiz;
    const nodes = SECTION_DATA[secId].nodes;
    const totalQ = getTotalQuestions(secId, nodeIdx);
    const q = getQuestion(secId, nodeIdx, questionIdx);
    const isCorrect = quizState.selected === q.correct;

    if (!isCorrect) {
      const nh = Math.max(0, hearts - 1);
      setHearts(nh);
      if (nh === 0) { toast("💔 Hearts habis! Istirahat dulu."); setTimeout(() => setHearts(5), 3000); }
      setQuizState({ selected:null, revealed:false });
      return;
    }

    // Correct — award per-question gems
    const node = nodes[nodeIdx];
    const perQPoints = Math.round((node.points || 20) / totalQ);
    setGems(g => g + perQPoints);

    const nextQ = questionIdx + 1;
    if (nextQ < totalQ) {
      // Move to next question in this node
      setActiveQuiz({ secId, nodeIdx, questionIdx: nextQ });
      setQuizState({ selected:null, revealed:false });
    } else {
      // All questions done — unlock next node
      const ns = { ...sectionNodeStates };
      const arr = [...ns[secId]];
      arr[nodeIdx] = "done";
      if (nodeIdx + 1 < nodes.length) arr[nodeIdx + 1] = "active";
      ns[secId] = arr;
      setSectionNodeStates(ns);
      if (arr.every(s => s === "done")) {
        setSectionDone(prev => ({ ...prev, [secId]:true }));
      }
      setActiveQuiz(null);
    }
  };

  const saveJournal = () => { setJournalSaved(true); toast("📝 Jurnal berhasil dikirim ke Guru!"); };

  const handleSectionChange = (id) => {
    setCurrentSection(id);
    setActiveQuiz(null);
  };

  // ── SECTION DONE SCREEN ──
  if (sectionDone[currentSection]) {
    const sd = SECTION_DATA[currentSection];
    return (
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
        flex:1, minHeight:0, overflowY:"auto", padding:32, textAlign:"center", background:C.white }}>
        <div style={{ fontSize:72, marginBottom:10, animation:"popIn .6s ease" }}>{sd.trophy}</div>
        <h1 style={{ fontWeight:900, fontSize:24, color:C.ink, fontFamily:ff, marginBottom:6 }}>
          {sd.label} Selesai!
        </h1>
        <div style={{ background:`${sd.bannerColor}18`, borderRadius:12, padding:"8px 18px",
          marginBottom:16, border:`2px solid ${sd.bannerColor}44` }}>
          <span style={{ fontWeight:800, fontSize:13, color:sd.bannerColor, fontFamily:ff }}>{sd.title}</span>
        </div>
        <p style={{ fontWeight:700, fontSize:14, color:C.ink2, fontFamily:ff, lineHeight:1.6,
          marginBottom:24, maxWidth:280 }}>
          Kamu berhasil menguasai semua unit di bagian ini. Lanjutkan ke bagian berikutnya!
        </p>
        <div style={{ background:`linear-gradient(135deg,${sd.bannerColor},${sd.bannerColorDk})`,
          borderRadius:20, padding:"14px 28px", marginBottom:24,
          boxShadow:`0 8px 24px ${sd.bannerColor}55` }}>
          <div style={{ fontWeight:900, fontSize:28, color:"#fff", fontFamily:ff }}>💎 {gems} AP</div>
          <div style={{ fontWeight:700, fontSize:12, color:"rgba(255,255,255,.85)", fontFamily:ff }}>Total Akhlaq Points</div>
        </div>
        <div style={{ display:"flex", flexDirection:"column", gap:10, width:"100%" }}>
          <button onClick={() => setSectionDone(prev => ({ ...prev, [currentSection]:false }))}
            style={{ background:`linear-gradient(135deg,${sd.bannerColor},${sd.bannerColorDk})`,
              border:"none", borderRadius:14, padding:"13px 0", fontWeight:900, fontSize:15,
              fontFamily:ff, color:"#fff", cursor:"pointer",
              boxShadow:`0 6px 20px ${sd.bannerColor}44` }}>
            Ulangi {sd.label}
          </button>
          {currentSection < 3 && (
            <button onClick={() => { setSectionDone(prev => ({ ...prev, [currentSection]:false })); handleSectionChange(currentSection + 1); }}
              style={{ background:`linear-gradient(135deg,${C.green},${C.greenDk})`, border:"none",
                borderRadius:14, padding:"13px 0", fontWeight:900, fontSize:15, fontFamily:ff,
                color:"#fff", cursor:"pointer", boxShadow:`0 6px 20px ${C.green}44` }}>
              Lanjut ke Bagian {currentSection + 1} →
            </button>
          )}
          <button onClick={() => onSwitch("select")}
            style={{ background:"none", border:`2px solid ${C.border}`, borderRadius:14,
              padding:"10px 0", fontWeight:800, fontSize:14, fontFamily:ff,
              color:C.ink2, cursor:"pointer" }}>
            Kembali ke Menu
          </button>
        </div>
      </div>
    );
  }

  // ── QUIZ SCREEN ──
  if (activeQuiz !== null) {
    const { secId, nodeIdx, questionIdx } = activeQuiz;
    const node = SECTION_DATA[secId].nodes[nodeIdx];
    const totalQ = getTotalQuestions(secId, nodeIdx);
    const q = getQuestion(secId, nodeIdx, questionIdx);

    const nodeIcon  = node.icon  || "📝";
    const nodeConcept = q.concept || node.concept || "";
    const nodeUnit    = node.unit  || "";
    // progress: per-question within the node
    const progressPct = ((questionIdx + (revealed && correct ? 1 : 0)) / totalQ) * 100;

    return (
      <div style={{ display:"flex", flexDirection:"column", flex:1, minHeight:0, background:C.white, overflow:"hidden", position:"relative" }}>
        <Toast msg={toastMsg} show={toastShow}/>

        {/* ── HEADER ── */}
        <div style={{ padding:"12px 16px", borderBottom:`2px solid ${C.border}`,
          background:C.white, flexShrink:0 }}>
          {/* top row: close + hearts */}
          <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:8 }}>
            <button onClick={() => setActiveQuiz(null)}
              style={{ background:"none", border:"none", fontSize:20, cursor:"pointer",
                color:C.muted, lineHeight:1, padding:0 }}>✕</button>
            <div style={{ display:"flex", alignItems:"center", gap:6 }}>

                ))}
              </div>
            </div>
          </div>

          {/* progress bar with step counter */}
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ flex:1, height:12, background:"#f0f0f0", borderRadius:10,
              overflow:"hidden", position:"relative",
              boxShadow:"inset 0 2px 4px rgba(0,0,0,.08)" }}>

            borderRadius:"20px 20px 0 0",
            padding:"16px 18px 24px",
            animation:"slideUp .35s cubic-bezier(.34,1.3,.64,1)",
            boxShadow:"0 -4px 24px rgba(0,0,0,.18)",
            zIndex:10,
          }}>
            {/* concept badge */}
            <div style={{ display:"inline-flex", alignItems:"center", gap:6,
              background:"rgba(255,255,255,.2)", borderRadius:20, padding:"4px 12px",
              marginBottom:10 }}>
              <span style={{ fontSize:12 }}>{correct ? "🌟" : "📖"}</span>
              <span style={{ fontWeight:800, fontSize:11, color:"#fff",
                fontFamily:ff, letterSpacing:.8 }}>
                Konsep: {nodeConcept}
              </span>
            </div>

            {/* title */}
            <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
              <div style={{ width:36, height:36, borderRadius:"50%",
                background:"rgba(255,255,255,.22)",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>
                {correct ? "✨" : "💪"}
              </div>
              <div style={{ color:"#fff", fontWeight:900, fontSize:15, fontFamily:ff }}>
                {correct
                  ? `Akhlaqul Karimah! +${Math.round((node.points||20)/totalQ)} AP`
                  : "Kurang tepat — coba lagi!"}
              </div>
            </div>

            {/* hadith / explanation */}
            <div style={{ background:"rgba(255,255,255,.16)", borderRadius:12,
              padding:"10px 13px", marginBottom:14 }}>
              <p style={{ color:"#fff", fontSize:12, fontFamily:ff, lineHeight:1.6, margin:0 }}>
                {correct ? (q.successHadith || q.successMsg) : (q.failMsg)}
              </p>
            </div>

            {/* action button */}
            <button onClick={nextAfterAnswer}
              style={{ width:"100%", background:"#fff", border:"none",
                borderRadius:14, padding:"13px 0",
                fontWeight:900, fontSize:15, fontFamily:ff,
                color: correct ? C.greenDk : C.redDk,
                cursor:"pointer",
                boxShadow:"0 4px 12px rgba(0,0,0,.12)",
                transition:"transform .1s ease" }}
              onMouseDown={e => e.currentTarget.style.transform="scale(.98)"}
              onMouseUp={e => e.currentTarget.style.transform="scale(1)"}>
              {correct
                ? (questionIdx + 1 < totalQ ? `Soal Berikutnya →` : "🎉 Selesaikan Unit!")
                : "Ulangi Soal Ini 🔄"}
            </button>
          </div>
        )}

        {/* ── CONFIRM BUTTON (only when not revealed) ── */}
        {!revealed && (
          <div style={{ padding:"12px 16px 20px", background:C.white, flexShrink:0,
            borderTop:`2px solid ${C.border}`, position:"relative", zIndex:20 }}>
            <button onClick={confirmAnswer} disabled={!selected}
              style={{ position:"relative", width:"100%", border:"none",
                borderRadius:14, padding:"15px 0",
                fontWeight:900, fontSize:16, fontFamily:ff,
                background: selected
                  ? `linear-gradient(135deg,${nodeColor},${nodeColor}cc)`
                  : "#e8e8e8",
                color: selected ? "#fff" : C.muted,
                cursor: selected ? "pointer" : "default",
                transition:"all .2s ease",
                boxShadow: selected
                  ? `0 0 0 2px ${nodeColor}88, 0 5px 0 ${nodeColor}88`
                  : "none",
                transform:"translateY(0)" }}
              onMouseDown={e => selected && (e.currentTarget.style.transform="translateY(3px)")}
              onMouseUp={e => selected && (e.currentTarget.style.transform="translateY(0)")}>
              ✔ Konfirmasi Pilihan
            </button>
          </div>
        )}
      </div>
    );
  }

  // ── HOME SCREEN ──
  return (
    <div style={{ display:"flex", flexDirection:"column", flex:1, minHeight:0, background:C.white, overflow:"hidden" }}>
      <Toast msg={toastMsg} show={toastShow}/>

      {/* ── TOP STATS BAR ── */}
      <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
        padding:"10px 16px", borderBottom:`2px solid ${C.border}`,
        position:"sticky", top:0, zIndex:100, background:C.white }}>
        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
          <span style={{ fontSize:18 }}>🔥</span>
          <span style={{ fontWeight:900, fontSize:16, color:C.gold, fontFamily:ff }}>{streak}</span>
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:5 }}>
          <span style={{ fontSize:16 }}>💎</span>
          <span style={{ fontWeight:900, fontSize:16, color:C.blue, fontFamily:ff }}>{gems}</span>
        </div>
        <div style={{ display:"flex", gap:3 }}>
          {Array.from({length:5}).map((_,i) => (
            <span key={i} style={{ fontSize:16, opacity:i<hearts?1:.25 }}>❤️</span>
          ))}
        </div>
        <div style={{ display:"flex", alignItems:"center", gap:4,
          background:`linear-gradient(135deg,${C.red},${C.redDk})`,
          borderRadius:16, padding:"4px 10px" }}>
          <span style={{ fontSize:12 }}>⚡</span>
          <span style={{ fontWeight:900, fontSize:13, color:"#fff", fontFamily:ff }}>25</span>
        </div>
      </div>

      {/* ── SECTION SWITCHER ── */}
      <SectionSwitcher
        current={currentSection}
        onChange={handleSectionChange}
        sectionDone={sectionDone}
      />

      {/* ── SECTION PROGRESS PILLS ── */}
      <div style={{ display:"flex", gap:6, padding:"10px 14px 0" }}>
        {[1,2,3].map(id => {
          const s = SECTION_DATA[id];
          const ns = sectionNodeStates[id];
          const done = ns.filter(x => x==="done").length;
          const total = s.nodes.length;
          const pct = Math.round((done/total)*100);
          const isActive = id === currentSection;
          return (
            <button key={id} onClick={() => handleSectionChange(id)}
              style={{ flex:1, border: isActive ? `2px solid ${s.bannerColor}` : `2px solid ${C.border}`,
                borderRadius:12, padding:"7px 6px", background: isActive ? `${s.bannerColor}12` : C.surface,
                cursor:"pointer", transition:"all .2s" }}>
              <div style={{ fontSize:14, marginBottom:2 }}>{s.emoji}</div>
              <div style={{ fontWeight:900, fontSize:10, color: isActive ? s.bannerColor : C.muted,
                fontFamily:ff, marginBottom:3 }}>{s.label}</div>
              <div style={{ height:4, background:C.border, borderRadius:2, overflow:"hidden" }}>
                <div style={{ width:`${pct}%`, height:"100%", background:s.bannerColor,
                  borderRadius:2, transition:"width .5s" }}/>
              </div>
              <div style={{ fontWeight:700, fontSize:9, color:C.muted, fontFamily:ff, marginTop:2 }}>
                {done}/{total}
              </div>
            </button>
          );
        })}
      </div>

      {/* ── LEARNING PATH ── */}
      <div style={{ flex:1, minHeight:0, overflowY:"auto", overflowX:"hidden",
        padding:"22px 14px 36px",
        display:"flex", flexDirection:"column", alignItems:"center", gap:30 }}>

        {sec.nodes.map((q, idx) => {
          const st = nodeStates[idx] || "locked";
          const sz = st==="active" ? 70 : 62;
          const bg = st==="done"
            ? `linear-gradient(135deg,${C.green},${C.greenDk})`
            : st==="active"
            ? `linear-gradient(135deg,${q.color},${q.color}cc)`
            : `linear-gradient(135deg,#e0e0e0,#ccc)`;
          const sh = st==="done"
            ? `0 6px 20px ${C.green}55`
            : st==="active"
            ? `0 6px 24px ${q.color}66`
            : `0 3px 10px rgba(0,0,0,.1)`;
          const xOff = XOFF[idx % XOFF.length];

          return (
            <div key={q.id} style={{ position:"relative", width:"100%", display:"flex", justifyContent:"center" }}>
              {/* connector to next node */}
              {idx < sec.nodes.length - 1 && (
                <div style={{ position:"absolute", top:"50%", left:"50%", width:3, height:38,
                  borderRadius:4, zIndex:0, opacity:.65,
                  background: st==="done"
                    ? `linear-gradient(to bottom,${C.green},${sec.bannerColor})`
                    : "linear-gradient(to bottom,#ddd,#eee)",
                  transform:`translateX(${xOff}px) translateX(-50%)` }}/>
              )}

              <div style={{ marginLeft:xOff, position:"relative", zIndex:1 }}>
                {/* pulse ring for active */}
                {st==="active" && (
                  <div style={{ position:"absolute", width:sz+20, height:sz+20, borderRadius:"50%",
                    background:`${q.color}20`, top:-10, left:-10,
                    animation:"pulse 2s infinite", pointerEvents:"none" }}/>
                )}

                {/* node circle */}
                <div
                  onClick={() => openQuiz(currentSection, idx)}
                  style={{ width:sz, height:sz, borderRadius:"50%",
                    background:bg, boxShadow:sh,
                    border: st==="done" ? `4px solid ${C.greenDk}` : st==="locked" ? "4px solid #bbb" : "none",
                    display:"flex", alignItems:"center", justifyContent:"center",
                    cursor:"pointer", position:"relative", transition:"transform .15s" }}
                  onMouseEnter={e => e.currentTarget.style.transform="scale(1.1)"}
                  onMouseLeave={e => e.currentTarget.style.transform="scale(1)"}
                >
                  {/* shine */}
                  <div style={{ position:"absolute", top:"10%", left:"20%", width:"28%", height:"18%",
                    background:"rgba(255,255,255,.3)", borderRadius:"50%", transform:"rotate(-20deg)" }}/>
                  {/* bottom shadow */}
                  <div style={{ position:"absolute", bottom:0, left:"15%", right:"15%", height:"26%",
                    background:"rgba(0,0,0,.15)", borderRadius:"0 0 50% 50%" }}/>
                  <span style={{ fontSize: st==="active" ? 26 : 22 }}>
                    {st==="locked" ? "🔒" : st==="done" ? "⭐" : q.icon}
                  </span>
                </div>

                {/* label */}
                <div style={{ marginTop:6, fontSize:10, fontWeight:800, textAlign:"center",
                  maxWidth:78, fontFamily:ff,
                  color: st==="locked" ? C.muted : C.ink2 }}>
                  {q.title}
                </div>
              </div>
            </div>
          );
        })}

        {/* Trophy node */}
        <div style={{ textAlign:"center", paddingTop:4 }}>
          <div style={{ width:60, height:60, borderRadius:"50%", margin:"0 auto 6px",
            background: sectionDone[currentSection]
              ? `linear-gradient(135deg,${sec.bannerColor},${sec.bannerColorDk})`
              : "linear-gradient(135deg,#e8e8e8,#d0d0d0)",
            display:"flex", alignItems:"center", justifyContent:"center", fontSize:28,
            boxShadow: sectionDone[currentSection] ? `0 6px 20px ${sec.bannerColor}55` : "none",
            animation: sectionDone[currentSection] ? "floatUp 3s ease-in-out infinite" : "none",
            transition:"all .4s ease",
          }}>
            {sec.trophy}
          </div>
          <div style={{ fontSize:10, fontWeight:800, color:C.muted, fontFamily:ff }}>
            {sec.trophyLabel}
          </div>
        </div>
      </div>

      {/* ── MODALS ── */}
      <Modal open={modal==="journal"} onClose={() => setModal(null)} title="📝 Reflection Journal" color={C.teal}>
        <p style={{ fontWeight:700, fontSize:13, color:C.ink2, fontFamily:ff, marginBottom:12, lineHeight:1.5 }}>
          Ceritakan pengalaman akhlakmu hari ini. Guru akan membacanya! 🦉
        </p>
        {journalSaved ? (
          <div style={{ background:C.greenBg, border:`2px solid ${C.green}`, borderRadius:14,
            padding:16, textAlign:"center" }}>
            <div style={{ fontSize:32 }}>✅</div>
            <div style={{ fontWeight:900, fontSize:15, color:C.greenDk, fontFamily:ff, marginTop:6 }}>Jurnal Terkirim!</div>
            <div style={{ fontWeight:700, fontSize:12, color:C.ink2, fontFamily:ff, marginTop:4 }}>Guru kamu akan membaca refleksimu segera.</div>
          </div>
        ) : (
          <>
            <textarea value={journalText} onChange={e => setJournalText(e.target.value)}
              placeholder="Tuliskan refleksimu di sini..."
              style={{ width:"100%", height:120, border:`2px solid ${C.border}`, borderRadius:12,
                padding:12, fontFamily:ff, fontSize:13, fontWeight:700, color:C.ink,
                resize:"none", outline:"none", boxSizing:"border-box" }}/>
            <button onClick={saveJournal} disabled={!journalText.trim()}
              style={{ width:"100%", marginTop:12,
                background: journalText.trim() ? `linear-gradient(135deg,${C.teal},#00a882)` : C.border,
                border:"none", borderRadius:12, padding:"13px 0", fontWeight:900, fontSize:15,
                fontFamily:ff, color: journalText.trim() ? "#fff" : C.muted,
                cursor: journalText.trim() ? "pointer" : "default" }}>
              Kirim Jurnal
            </button>
          </>
        )}
      </Modal>

      <Modal open={modal==="leaderboard"} onClose={() => setModal(null)} title="🏆 Papan Peringkat" color={C.gold}>
        {[{n:"Rizky Ramadhan",g:420,s:18},{n:"Fatimah Az-Zahra",g:340,s:12},{n:"Kamu",g:gems,s:streak,me:true},{n:"Ahmad Fauzi",g:180,s:5}]
          .sort((a,b) => b.g-a.g).map((p,i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", gap:12, padding:"10px 0",
            borderBottom:`1px solid ${C.border}` }}>
            <div style={{ width:32, height:32, borderRadius:"50%", flexShrink:0,
              display:"flex", alignItems:"center", justifyContent:"center",
              fontWeight:900, fontSize:13, fontFamily:ff,
              color: i<3 ? "#fff" : C.muted,
              background: i===0 ? `linear-gradient(135deg,${C.gold},${C.goldDk})`
                : i===1 ? "linear-gradient(135deg,#c0c0c0,#a0a0a0)"
                : i===2 ? "linear-gradient(135deg,#cd7f32,#a0522d)"
                : `linear-gradient(135deg,${C.surface},${C.border})` }}>
              {i+1}
            </div>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:900, fontSize:14, fontFamily:ff, color:p.me?C.blue:C.ink }}>
                {p.n}{p.me?" (Kamu)":""}
              </div>
              <div style={{ fontWeight:700, fontSize:11, color:C.muted, fontFamily:ff }}>🔥 {p.s} streak</div>
            </div>
            <div style={{ fontWeight:900, fontSize:15, color:C.gold, fontFamily:ff }}>💎{p.g}</div>
          </div>
        ))}
      </Modal>

      <Modal open={modal==="profile"} onClose={() => setModal(null)} title="👤 Profil Akhlaq" color={C.purple}>
        <div style={{ textAlign:"center", marginBottom:18 }}>
          <div style={{ fontSize:52 }}>🧕</div>
          <div style={{ fontWeight:900, fontSize:18, color:C.ink, fontFamily:ff }}>Fatimah Az-Zahra</div>
          <div style={{ fontWeight:700, fontSize:12, color:C.muted, fontFamily:ff }}>Kelas 8A</div>
        </div>
        <div style={{ display:"flex", gap:8, marginBottom:12 }}>
          {[1,2,3].map(id => {
            const s = SECTION_DATA[id];
            const ns = sectionNodeStates[id];
            const done = ns.filter(x=>x==="done").length;
            return (
              <div key={id} style={{ flex:1, background:sectionDone[id]?`${s.bannerColor}18`:C.surface,
                border:`2px solid ${sectionDone[id]?s.bannerColor:C.border}`,
                borderRadius:12, padding:"8px 6px", textAlign:"center" }}>
                <div style={{ fontSize:16 }}>{s.emoji}</div>
                <div style={{ fontWeight:900, fontSize:11, color:sectionDone[id]?s.bannerColor:C.ink2, fontFamily:ff }}>{s.label}</div>
                <div style={{ fontWeight:700, fontSize:10, color:C.muted, fontFamily:ff }}>{done}/{s.nodes.length}</div>
              </div>
            );
          })}
        </div>
        {[
          {label:"Akhlaq Points", val:gems, icon:"💎", color:C.blue},
          {label:"Streak Harian", val:`${streak} hari`, icon:"🔥", color:C.gold},
          {label:"Bagian Selesai", val:`${Object.values(sectionDone).filter(Boolean).length}/3`, icon:"🏆", color:C.green},
        ].map((item, i) => (
          <div key={i} style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
            padding:"11px 14px", background:C.surface, borderRadius:12, marginBottom:8 }}>
            <span style={{ fontWeight:700, fontSize:13, color:C.ink2, fontFamily:ff }}>{item.icon} {item.label}</span>
            <span style={{ fontWeight:900, fontSize:15, color:item.color, fontFamily:ff }}>{item.val}</span>
          </div>
        ))}
        <button onClick={() => { setModal(null); onSwitch("select"); }}
          style={{ width:"100%", marginTop:8,
            background:`linear-gradient(135deg,${C.red},${C.redDk})`,
            border:"none", borderRadius:12, padding:"12px 0", fontWeight:900, fontSize:14,
            fontFamily:ff, color:"#fff", cursor:"pointer" }}>
          Keluar / Ganti Peran
        </button>
      </Modal>

      {/* ── BOTTOM NAV ── */}
      <div style={{ borderTop:`2px solid ${C.border}`, display:"flex", justifyContent:"space-around",
        padding:"8px 0 12px", background:C.white, flexShrink:0, position:"relative", zIndex:50 }}>
        {[
          { ic:"🏠", lb:"Home",    act:true,  fn:()=>{} },
          { ic:"📝", lb:"Jurnal",  act:false, fn:()=>setModal("journal") },
          { ic:"🏆", lb:"Ranking", act:false, fn:()=>setModal("leaderboard") },
          { ic:"👤", lb:"Profil",  act:false, fn:()=>setModal("profile") },
        ].map((item, i) => (
          <button key={i} onClick={item.fn}
            style={{ background: item.act ? C.greenBg : "transparent",
              border: item.act ? `2px solid ${C.green}` : "2px solid transparent",
              borderRadius:12, padding:"7px 14px", cursor:"pointer",
              display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
            <span style={{ fontSize:19 }}>{item.ic}</span>
            <span style={{ fontSize:9, fontWeight:800, fontFamily:ff,
              color: item.act ? C.green : C.muted,
              textTransform:"uppercase", letterSpacing:.5 }}>{item.lb}</span>
          </button>
        ))}
      </div>
    </div>
  );
};

   TEACHER DASHBOARD

const TeacherDashboard=({onSwitch})=>{

      <div style={{background:`linear-gradient(135deg,#1a237e,#283593)`,padding:"16px 18px 20px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
          <div>
            <div style={{color:"rgba(255,255,255,.7)",fontSize:11,fontWeight:700,fontFamily:"'Nunito',sans-serif",letterSpacing:1}}>AKHLAQVERSE</div>
            <div style={{color:"#fff",fontSize:17,fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>Dasbor Guru PAI 📋</div>
          </div>
          <button onClick={()=>onSwitch("select")} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,padding:"6px 12px",cursor:"pointer",color:"#fff",fontWeight:800,fontSize:12,fontFamily:"'Nunito',sans-serif"}}>← Menu</button>
        </div>
        <div style={{display:"flex",gap:10,marginTop:10}}>
          {[{v:students.length,lb:"Total Siswa",ic:"👨‍🎓"},{v:students.filter(s=>s.doneUnits>=3).length,lb:"Lulus ≥3 Unit",ic:"✅"},{v:alertCount,lb:"Butuh Bimbingan",ic:"🚨",alert:alertCount>0}].map((s,i)=>(
            <div key={i} style={{flex:1,background:"rgba(255,255,255,.15)",borderRadius:12,padding:"10px 8px",textAlign:"center",border:s.alert?"2px solid #ff4b4b":"2px solid transparent"}}>
              <div style={{fontSize:20}}>{s.ic}</div>
              <div style={{fontWeight:900,fontSize:20,color:s.alert?C.red:"#fff",fontFamily:"'Nunito',sans-serif"}}>{s.v}</div>
              <div style={{fontWeight:700,fontSize:9,color:"rgba(255,255,255,.7)",fontFamily:"'Nunito',sans-serif",lineHeight:1.2}}>{s.lb}</div>
            </div>
          ))}
        </div>
      </div>

      {/* tabs */}
      <div style={{display:"flex",background:C.white,borderBottom:`2px solid ${C.border}`,overflowX:"auto",flexShrink:0}}>
        {TABS.map(t=>(
          <button key={t.id} onClick={()=>setActiveTab(t.id)} style={{flex:1,background:activeTab===t.id?C.blueBg:"transparent",border:"none",borderBottom:activeTab===t.id?`3px solid ${C.blue}`:"3px solid transparent",padding:"10px 4px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,position:"relative"}}>
            <span style={{fontSize:16}}>{t.ic}</span>
            <span style={{fontSize:9,fontWeight:800,fontFamily:"'Nunito',sans-serif",color:activeTab===t.id?C.blue:C.muted,textTransform:"uppercase",letterSpacing:.5}}>{t.lb}</span>
            {t.id==="alerts"&&alertCount>0&&<div style={{position:"absolute",top:6,right:"25%",width:14,height:14,borderRadius:"50%",background:C.red,display:"flex",alignItems:"center",justifyContent:"center",fontSize:8,color:"#fff",fontWeight:900,fontFamily:"'Nunito',sans-serif"}}>{alertCount}</div>}
          </button>
        ))}
      </div>

      <div style={{flex:1,minHeight:0,overflowY:"auto",overflowX:"hidden",padding:16}}>

        {/* OVERVIEW TAB */}
        {activeTab==="overview"&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <div style={{background:C.white,borderRadius:16,padding:16,boxShadow:"0 2px 10px rgba(0,0,0,.06)"}}>
              <div style={{fontWeight:900,fontSize:15,color:C.ink,fontFamily:"'Nunito',sans-serif",marginBottom:14}}>📈 Rata-Rata Kelas 8A</div>
              {[{lb:"Empati & Sosial",val:78,color:C.blue},{lb:"Pengendalian Diri",val:82,color:C.green},{lb:"Integritas",val:88,color:C.gold}].map((m,i)=>(
                <div key={i} style={{marginBottom:10}}>

    </div>

};

            <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{fontWeight:900,fontSize:14,color:C.ink,fontFamily:"'Nunito',sans-serif",marginBottom:12}}>📋 Riwayat Log</div>

          </div>
        )}

        {/* PROGRESS TAB */}
        {activeTab==="progress"&&(
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{background:C.white,borderRadius:16,padding:14,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
              <div style={{fontWeight:900,fontSize:14,color:C.ink,fontFamily:"'Nunito',sans-serif",marginBottom:12}}>🗺️ Peta Progress Unit</div>
              {QUIZZES.map((q,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                  <div style={{width:38,height:38,borderRadius:10,background:i<3?`linear-gradient(135deg,${q.color},${q.color}cc)`:`linear-gradient(135deg,#e0e0e0,#ccc)`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{i<3?q.icon:"🔒"}</div>

                    <div style={{height:5,background:C.border,borderRadius:4,marginTop:4,overflow:"hidden"}}>
                      <div style={{width:i<3?"100%":i===3?"0%":"0%",height:"100%",background:C.green,borderRadius:4}}/>
                    </div>
                  </div>
                  <span style={{fontWeight:900,fontSize:11,color:i<3?C.green:C.muted,fontFamily:"'Nunito',sans-serif"}}>{i<3?"✅ Selesai":"⏳"}</span>
                </div>
              ))}
            </div>
            <div style={{background:`linear-gradient(135deg,#4a148c,#6a1b9a)`,borderRadius:16,padding:14}}>
              <div style={{color:"rgba(255,255,255,.8)",fontSize:11,fontWeight:700,fontFamily:"'Nunito',sans-serif",letterSpacing:1,marginBottom:4}}>CATATAN DARI GURU PAI</div>
              <div style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:12}}>
                <p style={{color:"#fff",fontWeight:700,fontSize:13,fontFamily:"'Nunito',sans-serif",lineHeight:1.6,margin:0}}>
                  "Fatimah menunjukkan kemajuan luar biasa dalam memahami konsep Tabayyun dan Muru'ah. Nilai sikap afektif: A (Sangat Baik). Lanjutkan bimbingan di rumah!"
                </p>
                <div style={{color:"rgba(255,255,255,.6)",fontWeight:700,fontSize:11,fontFamily:"'Nunito',sans-serif",marginTop:8}}>— Guru PAI · 07 Jun 2026</div>
              </div>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

const SelectScreen = ({ onSelect }) => {
  const [activeRole, setActiveRole] = useState("student");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [showPw, setShowPw] = useState(false);
  const [pressed, setPressed] = useState(false);
  const [forgotClicked, setForgotClicked] = useState(false);
  const [emailFocused, setEmailFocused] = useState(false);
  const [pwFocused, setPwFocused] = useState(false);
  const [shake, setShake] = useState(false);
  const [loading, setLoading] = useState(false);

  const role = ROLES.find(r => r.id === activeRole);

  const handleLogin = () => {
    if (!email.trim() || !password.trim()) {
      setShake(true);
      setTimeout(() => setShake(false), 500);
      return;
    }
    setLoading(true);
    setTimeout(() => { setLoading(false); onSelect(activeRole); }, 900);
  };

  const handleForgot = () => {
    setForgotClicked(true);
    setTimeout(() => setForgotClicked(false), 2500);
  };

  const ff = "'Nunito', sans-serif";

  return (
    <div style={{
      display: "flex", flexDirection: "column",
      flex: 1, minHeight: 0, overflowY: "auto", overflowX: "hidden",
      background: role.bg,
      transition: "background 0.5s ease",
    }}>
      {/* ── TOP DECORATION ── */}
      <div style={{ position: "relative", padding: "36px 24px 0", textAlign: "center" }}>
        {/* Decorative circles */}
        <div style={{ position: "absolute", top: -40, right: -40, width: 160, height: 160, borderRadius: "50%", background: `${role.accent}18`, pointerEvents: "none" }}/>
        <div style={{ position: "absolute", top: 20, left: -30, width: 100, height: 100, borderRadius: "50%", background: `${role.accent}10`, pointerEvents: "none" }}/>

        {/* Logo */}
        <div style={{ display: "inline-flex", alignItems: "center", justifyContent: "center",
          width: 72, height: 72, borderRadius: 22, marginBottom: 14,
          background: `linear-gradient(135deg,${role.accent}33,${role.accent}11)`,
          border: `2px solid ${role.accent}44`,
          animation: "floatUp 3s ease-in-out infinite",
          fontSize: 36,
        }}>🕌</div>

        <h1 style={{ fontWeight: 900, fontSize: 28, color: "#fff", fontFamily: ff,
          letterSpacing: 2, marginBottom: 4 }}>AKHLAQVERSE</h1>
        <p style={{ fontWeight: 700, fontSize: 12, color: "rgba(255,255,255,.55)",
          fontFamily: ff, letterSpacing: 1 }}>Platform Pendidikan Akhlak Digital</p>
      </div>

      {/* ── ROLE SELECTOR TABS ── */}
      <div style={{ margin: "24px 20px 0", padding: 5,
        background: "rgba(0,0,0,.3)", borderRadius: 18,
        display: "flex", gap: 4, border: "1px solid rgba(255,255,255,.08)" }}>
        {ROLES.map(r => {
          const isActive = r.id === activeRole;
          return (
            <button key={r.id} onClick={() => { setActiveRole(r.id); setEmail(""); setPassword(""); setShowPw(false); }}
              style={{
                flex: 1, border: "none", borderRadius: 14, padding: "10px 4px",
                cursor: "pointer", transition: "all 0.3s ease",
                background: isActive ? r.grad : "transparent",
                boxShadow: isActive ? `0 4px 16px ${r.accentSh}` : "none",
                transform: isActive ? "translateY(-1px)" : "translateY(0)",
              }}>
              <div style={{ fontSize: 18, marginBottom: 2 }}>{r.icon}</div>
              <div style={{ fontWeight: 900, fontSize: 11, fontFamily: ff,
                color: isActive ? "#fff" : "rgba(255,255,255,.45)",
                letterSpacing: 0.5 }}>{r.label}</div>
            </button>
          );
        })}
      </div>

      {/* ── CARD ── */}
      <div style={{
        margin: "16px 20px 0", padding: "22px 20px",
        background: "rgba(255,255,255,.07)",
        borderRadius: 24, backdropFilter: "blur(12px)",

        boxShadow: `0 8px 32px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.08)`,
        animation: shake ? "shake 0.4s ease" : "none",
        transition: "border-color 0.4s ease",

        {/* Role label */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 18 }}>

            background: `linear-gradient(135deg,${role.accent},${role.accentDk})`,

            boxShadow: `0 4px 12px ${role.accentSh}` }}>{role.icon}</div>
          <div>
            <div style={{ fontWeight: 900, fontSize: 15, color: "#fff", fontFamily: ff }}>Masuk sebagai {role.label}</div>
            <div style={{ fontWeight: 700, fontSize: 10, color: "rgba(255,255,255,.5)", fontFamily: ff }}>{role.sub}</div>
          </div>
        </div>

        {/* EMAIL INPUT */}
        <div style={{ marginBottom: 12 }}>
          <label style={{ display: "block", fontWeight: 800, fontSize: 11,
            color: emailFocused ? role.accent : "rgba(255,255,255,.6)",

                width: "100%", padding: "13px 14px 13px 42px",
                background: emailFocused ? "rgba(255,255,255,.12)" : "rgba(255,255,255,.07)",
                border: `2px solid ${emailFocused ? role.accent : "rgba(255,255,255,.12)"}`,
                borderRadius: 14, outline: "none",
                fontFamily: ff, fontWeight: 700, fontSize: 13,
                color: "#fff", transition: "all 0.25s ease",
                boxShadow: emailFocused ? `0 0 0 4px ${role.accent}22` : "none",
                boxSizing: "border-box",

            />
          </div>
        </div>

        {/* PASSWORD INPUT */}
        <div style={{ marginBottom: 6 }}>
          <label style={{ display: "block", fontWeight: 800, fontSize: 11,

            <input

          <button
            onMouseDown={() => setPressed(true)}
            onMouseUp={() => { setPressed(false); handleLogin(); }}

            onTouchStart={() => setPressed(true)}
            onTouchEnd={() => { setPressed(false); handleLogin(); }}
            style={{
              position: "relative", width: "100%", border: "none",
              borderRadius: 16, padding: "15px 0",
              background: role.grad,
              fontFamily: ff, fontWeight: 900, fontSize: 16,
              color: role.id === "parent" ? "#5a3e00" : "#fff",
              cursor: "pointer",
              transform: pressed ? "translateY(4px)" : "translateY(0)",
              transition: "transform 0.1s ease",
              letterSpacing: 0.5,
              boxShadow: pressed
                ? "none"
                : `0 0 0 2px ${role.accentDk}, 0 6px 0 ${role.accentDk}`,
              display: "flex", alignItems: "center", justifyContent: "center", gap: 8,
            }}>
            {loading ? (
              <>
                <div style={{ width: 18, height: 18, border: `3px solid rgba(255,255,255,.3)`,
                  borderTop: "3px solid #fff", borderRadius: "50%",

        <span style={{ fontSize: 18 }}>💡</span>

        </p>
      </div>

      {/* ── FOOTER ── */}
      <div style={{ marginTop: "auto", padding: "20px 0 28px", textAlign: "center" }}>
        <div style={{ fontWeight: 700, fontSize: 10, color: "rgba(255,255,255,.25)", fontFamily: ff, letterSpacing: 1 }}>
          AKHLAQVERSE © 2026 · Versi Prototipe
        </div>
      </div>

          0%,100%{transform:translateX(0)}
          20%{transform:translateX(-8px)}
          40%{transform:translateX(8px)}
          60%{transform:translateX(-6px)}
          80%{transform:translateX(6px)}
        }
        @keyframes spin {
          to{transform:rotate(360deg)}
        }
        input::placeholder { color: rgba(255,255,255,.3) !important; }
        input:-webkit-autofill {
          -webkit-box-shadow: 0 0 0 100px rgba(255,255,255,.08) inset !important;
          -webkit-text-fill-color: #fff !important;
        }
      `}</style>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════
   ROOT
══════════════════════════════════════════════════════════════ */
function App(){
  const [screen,setScreen]=useState("select");
  // This div fills #react-root which is already 100% of the padded shell.
  // flex:1 + minHeight:0 ensures children can scroll internally without
  // ever making the outer shell grow or shrink.
  return(
    <div style={{
      flex:1,
      minHeight:0,
      display:"flex",
      flexDirection:"column",
      background:C.white,
      overflow:"hidden",
      position:"relative",
    }}>
      {screen==="select"&&<SelectScreen onSelect={setScreen}/>}
      {screen==="student"&&<StudentDashboard onSwitch={setScreen}/>}
      {screen==="teacher"&&<TeacherDashboard onSwitch={setScreen}/>}
      {screen==="parent"&&<ParentDashboard onSwitch={setScreen}/>}
    </div>
  );
}


    // Mount the app
    const container = document.getElementById('react-root');
    const reactRoot = ReactDOM.createRoot(container);
    reactRoot.render(<App />);
  </script>
</body>
